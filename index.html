<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経費立替管理 | 匡電気管理事務所</title>
<style>
:root{--bg:#F7F8FA;--surface:#FFFFFF;--border:#E2E6EA;--primary:#3333AA;--primary-h:#22228A;--danger:#C81E1E;--success:#057A55;--warn:#B45309;--text:#111928;--muted:#6B7280;--radius:8px;--font:"Hiragino Sans","Meiryo",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.headerLogo{display:flex;align-items:center;gap:10px}
.headerLogo img{height:34px;width:auto;border-radius:0}
.headerLogo .logoText{font-size:14px;font-weight:700;color:var(--primary)}
.headerLogo .logoSub{font-size:11px;color:var(--muted)}
#userInfo{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted)}
#btnLogout{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--muted)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
.tab{padding:12px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
main{max-width:900px;margin:24px auto;padding:0 16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:700;margin-bottom:20px}
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EAEAF8,#F7F8FA)}
.loginCard{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:40px 36px;width:380px;max-width:95vw}
.loginCard h2{font-size:14px;font-weight:600;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.formRow{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--surface);-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(51,51,170,.1)}
textarea{resize:vertical;min-height:72px}
.btn{display:inline-flex;align-items:center;padding:9px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--primary-h)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-warn{background:var(--warn);color:#fff}
.btn-block{width:100%;justify-content:center}
.btn-text{background:none;border:none;color:var(--primary);font-size:12px;cursor:pointer;padding:0;font-family:var(--font);text-decoration:underline}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-申請中{background:#FEF3C7;color:#92400E}
.badge-承認済み{background:#D1FAE5;color:#065F46}
.badge-却下{background:#FEE2E2;color:#991B1B}
.badge-未精算{background:#FEF3C7;color:#92400E}
.badge-精算済み{background:#D1FAE5;color:#065F46}
.tableWrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);font-size:11px;font-weight:700;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F9FAFB}
.amount{font-weight:700;text-align:right}
.summaryBar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.summaryItem{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;flex:1;min-width:130px}
.summaryItem .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.summaryItem .value{font-size:22px;font-weight:700;margin-top:4px}
.summaryItem .value.blue{color:var(--primary)}
.summaryItem .value.green{color:var(--success)}
.summaryItem .value.orange{color:var(--warn)}
.alert{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px}
.alert-error{background:#FEE2E2;color:var(--danger)}
.alert-success{background:#D1FAE5;color:var(--success)}
.modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modalCard{background:var(--surface);border-radius:12px;padding:32px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modalCard h3{font-size:16px;font-weight:700;margin-bottom:20px}
.hidden{display:none!important}
.flex{display:flex;align-items:center;gap:8px}
.mt16{margin-top:16px}
.muted{color:var(--muted)}
.loginLinks{display:flex;justify-content:space-between;margin-top:14px}
</style>
</head>

<div class="card">
<div class="flex" style="justify-content:space-between;margin-bottom:16px">
<h2 style="margin:0">全申請一覧</h2>
<div class="flex">
<select id="adminFilter" onchange="renderAdminTable()" style="width:auto;font-size:12px;padding:6px 10px">
<option value="">すべて</option><option value="申請中">申請中のみ</option>
<option value="承認済み">承認済みのみ</option><option value="却下">却下のみ</option>
</select>
<button class="btn btn-outline" style="font-size:12px;padding:6px 12px" onclick="downloadCSV()">CSV出力</button>
</div></div>
<div id="adminAlert" class="hidden"></div>
<div class="tableWrap"><table>
<thead><tr><th>申請日</th><th>申請者</th><th>発生日</th><th>項目</th><th>購入先</th><th>用途</th><th>備考</th><th>金額</th><th>ステータス</th><th>精算</th><th>操作</th></tr></thead>
<tbody id="adminBody"></tbody>
</table></div></div></div>

<div id="page-manual" class="hidden">
<div class="card">
<div class="flex" style="justify-content:space-between;margin-bottom:16px">
<h2 style="margin:0">取扱マニュアル</h2>
<button class="btn btn-primary" style="font-size:12px;padding:6px 14px" onclick="downloadPDF()">PDFダウンロード</button>
</div>
<div style="border:1px solid var(--border);border-radius:6px;overflow:hidden">
<iframe id="manualFrame" style="width:100%;height:80vh;border:none" title="取扱マニュアル"></iframe>
</div></div></div>
</main></div>

<script>
var GAS_URL="https://script.google.com/macros/s/AKfycbyIahK65F28eUThDjopBB_HP-ufD9rbFwzN7Axie9HdXZO3IUj_OayyfvN05Ri5_-YyZA/exec";
var currentUser=null,isAdmin=false,allExpenses=[],myExpenses=[];

function getPDF(){return "data:application/pdf;base64,"+document.getElementById("pdfData").value;}

function doLogin(){
  var user=document.getElementById("loginUser").value.trim();
  var pass=document.getElementById("loginPass").value.trim();
  var btn=document.getElementById("btnLogin");
  var err=document.getElementById("loginError");
  if(!user||!pass){showEl(err,"アカウント名とパスワードを入力してください","error");return;}
  btn.disabled=true;btn.textContent="ログイン中...";err.classList.add("hidden");
  gasGet({action:"login",username:user,password:pass}).then(function(res){
    if(res.success){
      currentUser=res.username;isAdmin=res.isAdmin;
      document.getElementById("loginWrap").classList.add("hidden");
      document.getElementById("appWrap").classList.remove("hidden");
      document.getElementById("headerUsername").textContent=currentUser+(isAdmin?"（管理者）":"");
      if(isAdmin)document.getElementById("tab-admin").classList.remove("hidden");
      switchTab("my");loadMyExpenses();
    }else{showEl(err,res.error||"ログインに失敗しました","error");}
    btn.disabled=false;btn.textContent="ログイン";
  }).catch(function(e){showEl(err,"通信エラー: "+e.message,"error");btn.disabled=false;btn.textContent="ログイン";});
}
document.getElementById("loginPass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
document.getElementById("loginUser").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

function logout(){
  currentUser=null;isAdmin=false;allExpenses=[];myExpenses=[];
  document.getElementById("appWrap").classList.add("hidden");
  document.getElementById("loginWrap").classList.remove("hidden");
  document.getElementById("loginPass").value="";
}

function doChangePass(){
  var user=document.getElementById("cpUser").value.trim();
  var old=document.getElementById("cpOld").value.trim();
  var nw=document.getElementById("cpNew").value.trim();
  var nw2=document.getElementById("cpNew2").value.trim();
  var a=document.getElementById("changePassAlert");
  if(!user||!old||!nw||!nw2){showEl(a,"すべて入力してください","error");return;}
  if(nw.length<6){showEl(a,"新しいパスワードは6文字以上","error");return;}
  if(nw!==nw2){showEl(a,"新しいパスワードが一致しません","error");return;}
  gasGet({action:"changePassword",username:user,oldPass:old,newPass:nw}).then(function(res){
    if(res.success){showEl(a,"パスワードを変更しました","success");setTimeout(function(){hideModal("changePassModal");},1500);}
    else{showEl(a,res.error||"変更に失敗しました","error");}
  }).catch(function(){showEl(a,"通信エラー","error");});
}

function doResetPass(){
  var user=document.getElementById("rpUser").value.trim();
  var a=document.getElementById("resetPassAlert");
  if(!user){showEl(a,"アカウント名を入力してください","error");return;}
  gasGet({action:"resetPassword",username:user}).then(function(res){
    if(res.success){showEl(a,"仮パスワードをメールで送信しました","success");setTimeout(function(){hideModal("resetPassModal");},2000);}
    else{showEl(a,res.error||"送信に失敗しました","error");}
  }).catch(function(){showEl(a,"通信エラー","error");});
}

function switchTab(name){
  ["my","apply","admin","manual"].forEach(function(t){
    document.getElementById("page-"+t).classList.add("hidden");
    var tb=document.getElementById("tab-"+t);if(tb)tb.classList.remove("active");
  });
  document.getElementById("page-"+name).classList.remove("hidden");
  var at=document.getElementById("tab-"+name);if(at)at.classList.add("active");
  if(name==="admin"&&isAdmin)loadAllExpenses();
  if(name==="manual"){
    var frame=document.getElementById("manualFrame");
    if(!frame.getAttribute("data-loaded")){frame.src=getPDF();frame.setAttribute("data-loaded","1");}
  }
}

function loadMyExpenses(){
  gasGet({action:"getMyExpenses",username:currentUser}).then(function(res){
    if(res.success){myExpenses=res.data||[];renderMyTable();}
  }).catch(function(e){console.error(e);});
}

function renderMyTable(){
  var total=myExpenses.reduce(function(s,r){return s+Number(r["金額"]||0);},0);
  var pending=myExpenses.filter(function(r){return r["精算状況"]==="未精算";}).reduce(function(s,r){return s+Number(r["金額"]||0);},0);
  var settled=myExpenses.filter(function(r){return r["精算状況"]==="精算済み";}).reduce(function(s,r){return s+Number(r["金額"]||0);},0);
  document.getElementById("mySummaryBar").innerHTML=
    '<div class="summaryItem"><div class="label">合計申請額</div><div class="value blue">¥'+fmt(total)+'</div></div>'
    +'<div class="summaryItem"><div class="label">未精算</div><div class="value orange">¥'+fmt(pending)+'</div></div>'
    +'<div class="summaryItem"><div class="label">精算済み</div><div class="value green">¥'+fmt(settled)+'</div></div>'
    +'<div class="summaryItem"><div class="label">申請件数</div><div class="value">'+myExpenses.length+'件</div></div>';
  var tbody=document.getElementById("myBody");
  if(!myExpenses.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">申請はありません</td></tr>';return;}
  tbody.innerHTML=[].concat(myExpenses).reverse().map(function(r){
    return '<tr><td>'+r["発生日"]+'</td><td>'+r["項目"]+'</td>'
      +'<td class="muted">'+(r["購入先"]||"")+'</td>'
      +'<td class="muted">'+(r["用途"]||"")+'</td>'
      +'<td class="muted" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(r["備考"]||"")+'</td>'
      +'<td class="amount">¥'+fmt(r["金額"])+'</td>'
      +'<td><span class="badge badge-'+r["ステータス"]+'">'+r["ステータス"]+'</span></td>'
      +'<td><span class="badge badge-'+r["精算状況"]+'">'+r["精算状況"]+'</span></td></tr>';
  }).join("");
}

function submitExpense(){
  var date=document.getElementById("expDate").value;
  var category=document.getElementById("expCategory").value;
  var amount=document.getElementById("expAmount").value;
  var shop=document.getElementById("expShop").value;
  var purpose=document.getElementById("expPurpose").value;
  var note=document.getElementById("expNote").value;
  var alertEl=document.getElementById("applyAlert");
  if(!date||!category||!amount){showEl(alertEl,"発生日・項目・金額は必須です","error");return;}
  if(Number(amount)<=0){showEl(alertEl,"金額は1円以上で入力してください","error");return;}
  alertEl.classList.add("hidden");
  gasGet({action:"addExpense",username:currentUser,date:date,amount:amount,category:category,shop:shop,purpose:purpose,note:note}).then(function(res){
    if(res.success){
      showEl(alertEl,"申請しました（ID: "+res.id+"）","success");
      ["expDate","expCategory","expAmount","expShop","expPurpose","expNote"].forEach(function(id){document.getElementById(id).value="";});
      loadMyExpenses();
    }else{showEl(alertEl,res.error||"申請に失敗しました","error");}
  }).catch(function(){showEl(alertEl,"通信エラー","error");});
}

function loadAllExpenses(){
  gasGet({action:"getExpenses",username:currentUser,isAdmin:"true"}).then(function(res){
    if(res.success){allExpenses=res.data||[];renderAdminTable();}
  }).catch(function(e){console.error(e);});
}

function renderAdminTable(){
  var filter=document.getElementById("adminFilter").value;
  var list=filter?allExpenses.filter(function(r){return r["ステータス"]===filter;}):allExpenses;
  var total=allExpenses.reduce(function(s,r){return s+Number(r["金額"]||0);},0);
  var pending=allExpenses.filter(function(r){return r["ステータス"]==="申請中";}).reduce(function(s,r){return s+Number(r["金額"]||0);},0);
  var unsettled=allExpenses.filter(function(r){return r["精算状況"]==="未精算"&&r["ステータス"]==="承認済み";}).reduce(function(s,r){return s+Number(r["金額"]||0);},0);
  document.getElementById("adminSummaryBar").innerHTML=
    '<div class="summaryItem"><div class="label">総申請額</div><div class="value blue">¥'+fmt(total)+'</div></div>'
    +'<div class="summaryItem"><div class="label">承認待ち</div><div class="value orange">¥'+fmt(pending)+'</div></div>'
    +'<div class="summaryItem"><div class="label">精算待ち（承認済）</div><div class="value orange">¥'+fmt(unsettled)+'</div></div>'
    +'<div class="summaryItem"><div class="label">申請件数</div><div class="value">'+allExpenses.length+'件</div></div>';
  var tbody=document.getElementById("adminBody");
  if(!list.length){tbody.innerHTML='<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--muted)">データがありません</td></tr>';return;}
  tbody.innerHTML=[].concat(list).reverse().map(function(r){
    var acts=[];
    if(r["ステータス"]==="申請中"){
      acts.push('<button class="btn btn-success" style="font-size:11px;padding:4px 10px" onclick="updateStatus(&quot;'+r["ID"]+'&quot;,&quot;approve&quot;)">承認</button>');
      acts.push('<button class="btn btn-danger" style="font-size:11px;padding:4px 10px" onclick="updateStatus(&quot;'+r["ID"]+'&quot;,&quot;reject&quot;)">却下</button>');
    }
    if(r["ステータス"]==="承認済み"&&r["精算状況"]==="未精算")
      acts.push('<button class="btn btn-warn" style="font-size:11px;padding:4px 10px" onclick="updateStatus(&quot;'+r["ID"]+'&quot;,&quot;settle&quot;)">精算済み</button>');
    return '<tr>'
      +'<td class="muted">'+r["申請日"]+'</td><td><strong>'+r["申請者"]+'</strong></td>'
      +'<td>'+r["発生日"]+'</td><td>'+r["項目"]+'</td>'
      +'<td class="muted">'+(r["購入先"]||"")+'</td>'
      +'<td class="muted">'+(r["用途"]||"")+'</td>'
      +'<td class="muted" style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(r["備考"]||"")+'</td>'
      +'<td class="amount">¥'+fmt(r["金額"])+'</td>'
      +'<td><span class="badge badge-'+r["ステータス"]+'">'+r["ステータス"]+'</span></td>'
      +'<td><span class="badge badge-'+r["精算状況"]+'">'+r["精算状況"]+'</span></td>'
      +'<td><div class="flex" style="gap:4px">'+acts.join("")+'</div></td></tr>';
  }).join("");
}

function updateStatus(id,action){
  var a=document.getElementById("adminAlert");
  gasGet({action:"updateStatus",username:currentUser,isAdmin:"true",id:id,action:action}).then(function(res){
    if(res.success){showEl(a,"更新しました","success");loadAllExpenses();setTimeout(function(){a.classList.add("hidden");},3000);}
    else{showEl(a,res.error||"更新に失敗しました","error");}
  }).catch(function(){showEl(a,"通信エラー","error");});
}

function downloadCSV(){
  if(!allExpenses.length)return;
  var headers=["ID","申請者","申請日","発生日","金額","項目","購入先","用途","備考","ステータス","承認者","承認日","精算状況","精算日"];
  var rows=allExpenses.map(function(r){return headers.map(function(h){return '"'+String(r[h]||"").replace(/"/g,'""')+'"';}).join(",");});
  var csv=String.fromCharCode(65279)+headers.join(",")+String.fromCharCode(10)+rows.join(String.fromCharCode(10));
  var blob=new Blob([csv],{type:"text/csv"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="経費立替_"+today()+".csv";a.click();
  URL.revokeObjectURL(url);
}

function downloadPDF(){
  var a=document.createElement("a");
  a.href=getPDF();
  a.download="経費立替管理アプリ_取扱マニュアル.pdf";
  a.click();
}

function showModal(id){document.getElementById(id).classList.remove("hidden");}
function hideModal(id){document.getElementById(id).classList.add("hidden");}
document.querySelectorAll(".modalOverlay").forEach(function(el){
  el.addEventListener("click",function(e){if(e.target===el)el.classList.add("hidden");});
});

function gasGet(params){
  return new Promise(function(resolve,reject){
    var cbName="cb_"+Date.now()+"_"+Math.random().toString(36).slice(2);
    params.callback=cbName;
    var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(String(params[k]));}).join("&");
    var script=document.createElement("script");
    var timer=setTimeout(function(){
      delete window[cbName];
      if(script.parentNode)script.parentNode.removeChild(script);
      reject(new Error("通信タイムアウト"));
    },15000);
    window[cbName]=function(data){
      clearTimeout(timer);delete window[cbName];
      if(script.parentNode)script.parentNode.removeChild(script);
      resolve(data);
    };
    script.src=GAS_URL+"?"+qs;
    script.onerror=function(){
      clearTimeout(timer);delete window[cbName];
      if(script.parentNode)script.parentNode.removeChild(script);
      reject(new Error("スクリプト読み込みエラー"));
    };
    (document.head||document.body).appendChild(script);
  });
}

function showEl(el,msg,type){el.textContent=msg;el.className="alert alert-"+type;}
function fmt(n){return Number(n).toLocaleString("ja-JP");}
function today(){return new Date().toISOString().slice(0,10).replace(/-/g,"");}
</script>
</body>
</html>
